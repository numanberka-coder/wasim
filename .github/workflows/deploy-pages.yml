name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main, master, claude/vigilant-hawking-dgq2fn]
  workflow_dispatch:

# Pages deploy icin gereken izinler
permissions:
  contents: read
  pages: write
  id-token: write

# Ayni anda tek deploy calissin
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - run: npm ci

      - name: Build PWA
        run: npm run build:pwa

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-pwa

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
